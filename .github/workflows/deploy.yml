name: Build & Deploy (Public App)
on:
  push:
      branches: [ main ]
        workflow_dispatch:
        env:
          NODE_VERSION: '22'
            PAGES_REPO: 'casellado/ANAS_SafeHub_App'
            jobs:
              build-and-deploy:
                  runs-on: ubuntu-latest
                      steps:
                            - name: Checkout sorgente
                                    uses: actions/checkout@v4
                                          - name: Setup Node.js ${{ env.NODE_VERSION }}
                                                  uses: actions/setup-node@v4
                                                          with:
                                                                    node-version: ${{ env.NODE_VERSION }}
                                                                              cache: 'npm'
                                                                                    - name: Installa dipendenze
                                                                                            run: npm install
                                                                                                  - name: Build
                                                                                                          run: npm run build
                                                                                                                - name: Deploy su GitHub Pages
                                                                                                                        uses: peaceiris/actions-gh-pages@v4
                                                                                                                                with:
                                                                                                                                          personal_token: ${{ secrets.DEPLOY_TOKEN }}
                                                                                                                                                    external_repository: ${{ env.PAGES_REPO }}
                                                                                                                                                              publish_branch: gh-pages
                                                                                                                                                                        publish_dir: ./dist
                                                                                                                                                                                  force_orphan: false
                                                                                                                                                                                            enable_jekyll: false
                                                                                                                                                                                            
