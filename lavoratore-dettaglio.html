<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scheda Lavoratore · ANAS SafeHub</title>

  <script>
    // Sopprimi l'avviso di Tailwind CDN in produzione per mantenere pulita la console
    (function() {
      var _tw = 'cdn.tailwindcss.com should not be used in production';
      ['warn','log'].forEach(function(m) {
        var orig = console[m];
        console[m] = function() {
          if (arguments[0] && typeof arguments[0] === 'string' && arguments[0].indexOf(_tw) !== -1) return;
          return orig.apply(console, arguments);
        };
      });
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: Inter, sans-serif;
    }
  </style>

  <script defer src="./storage.js?v=2.2.4"></script>
  <script defer src="./ui.js?v=2.2.4"></script>
  <script defer src="./navigation.js?v=2.2.4"></script>
  <script defer src="./documenti-indexeddb.js?v=2.2.4"></script>
  <script defer src="./documenti-preview.js?v=2.2.4"></script>
  <script defer src="./documenti-collegamento.js?v=2.2.4"></script>
  <script defer src="./documenti-popup.js?v=2.2.4"></script>
  <script defer src="./documenti-imprese-lavoratori.js?v=2.2.4"></script>
  <script defer src="./impostazioni.js?v=2.2.4"></script>
  <script defer src="./salvataggio.js?v=2.2.4"></script>
  <script defer src="./email.js?v=2.2.4"></script>
  <script defer src="./export.js?v=2.2.4"></script>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SafeHub CSE" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <!-- firma.js -->
  <script defer src="./firma.js?v=2.2.4"></script>
  <script defer src="./smart-memory.js?v=2.2.4"></script>
  <style>
    input,
    textarea,
    select {
      font-size: max(16px, 0.875rem) !important;
    }

    button,
    [role="button"] {
      min-height: 44px;
    }

    [role="tablist"] {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      flex-wrap: nowrap !important;
    }

    [role="tablist"]::-webkit-scrollbar {
      display: none;
    }
  </style>
  <link rel="stylesheet" href="./animazioni.css" />
  <link rel="stylesheet" href="./mobile.css" />
</head>

<body class="bg-slate-50 text-slate-800 pb-12">

  <div class="max-w-3xl mx-auto px-4 py-6 space-y-8">

    <!-- HEADER -->
    <header class="flex justify-between items-start gap-4" role="banner">
      <div>
        <h1 class="text-2xl font-bold text-slate-800">Scheda Lavoratore</h1>
        <p class="text-sm text-slate-500">Dettaglio DPI, idoneità e formazione</p>
      </div>
      <button onclick="window.history.back()" class="shrink-0 bg-slate-800 text-white text-sm px-4 py-2 rounded-lg
                     hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-400"
        aria-label="Torna indietro">
        ← Indietro
      </button>
    </header>

    <!-- DETTAGLIO -->
    <section aria-label="Dettaglio lavoratore">
      <div id="lavoratore-dettaglio-container" class="min-h-[200px]" aria-live="polite">
        <div class="bg-white rounded-xl border border-slate-200 p-6 text-slate-400 text-sm animate-pulse">
          Caricamento…
        </div>
      </div>
    </section>

    <!-- DOCUMENTI LAVORATORE -->
    <section aria-labelledby="h-doc-lav">
      <div class="flex items-center justify-between mb-3">
        <h2 id="h-doc-lav" class="text-base font-semibold text-slate-700">
          📎 Documenti del Lavoratore
        </h2>
        <button id="btn-collega-doc" class="text-xs bg-slate-800 text-white px-3 py-1.5 rounded-lg
                       hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-400"
          aria-label="Collega documento al lavoratore">
          + Collega Documento
        </button>
      </div>
      <div id="documenti-lavoratore" aria-live="polite" class="space-y-2"></div>
    </section>

  </div>

  <script>
    let currentLavoratoreId = null;

    document.addEventListener('DOMContentLoaded', async () => {
      console.log('[SafeHub] Caricamento scheda lavoratore...');
      const container = document.getElementById('lavoratore-dettaglio-container');

      try {
        await initDB();
        console.log('[SafeHub] DB aperto. Versione:', DB_VERSION);

        const urlParams = new URLSearchParams(window.location.search);
        currentLavoratoreId = urlParams.get('id') || sessionStorage.getItem('currentLavoratoreId');

        if (!currentLavoratoreId) {
          container.innerHTML = '<p class="text-red-600 font-semibold text-center py-10">⚠️ Nessun lavoratore selezionato.</p>';
          return;
        }

        const l = await getItem('lavoratori', currentLavoratoreId);
        if (!l) {
          container.innerHTML = '<p class="text-red-600 font-semibold text-center py-10">⚠️ Lavoratore non trovato nel database.</p>';
          return;
        }

        // MOD-21: Calcolo scadenza idoneità medica
        const oggi = new Date();
        const scadenza = l.scadenzaVisita ? new Date(l.scadenzaVisita) : null;
        const isScaduto = scadenza && scadenza < oggi;

        const idoneitaColore = {
          'idoneo': isScaduto ? 'bg-red-100 text-red-800 border-red-300' : 'bg-green-100 text-green-800 border-green-300',
          'non idoneo': 'bg-red-100 text-red-800 border-red-300',
          'non verificata': 'bg-slate-100 text-slate-600 border-slate-300'
        };

        const badgeClass = idoneitaColore[l.idoneita] || idoneitaColore['non verificata'];
        const labelVisita = isScaduto ? '⚠️ VISITA SCADUTA' : (l.idoneita || 'Non verificata');
        const dataVisitaFmt = l.scadenzaVisita ? new Date(l.scadenzaVisita).toLocaleDateString('it-IT') : 'N.D.';

        container.innerHTML = `
        <div class="bg-white p-6 rounded-xl shadow border border-slate-200 space-y-5">

          <div class="flex items-start justify-between gap-4">
            <div>
              <h2 class="text-xl font-bold text-slate-800">${l.nome || ''} ${l.cognome || ''}</h2>
              <div class="text-sm text-slate-500 mt-0.5">${l.mansione || 'Mansione non specificata'}</div>
              <div class="flex items-center gap-2 mt-1">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Scadenza Visita:</span>
                <span class="text-xs font-mono ${isScaduto ? 'text-red-600 font-bold' : 'text-slate-600'}">${dataVisitaFmt}</span>
              </div>
              ${l.cf ? `<div class="text-[10px] text-slate-400 font-mono mt-0.5">C.F.: ${l.cf}</div>` : ''}
            </div>
            <span class="text-[10px] font-bold px-2.5 py-1 rounded-lg border ${badgeClass} shrink-0 uppercase tracking-tight ${isScaduto ? 'animate-pulse' : ''}">
              ${labelVisita}
            </span>
          </div>

          <div>
            <div class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">
              DPI Consegnati
            </div>
            ${l.dpi?.length > 0
            ? `<ul class="flex flex-wrap gap-2">
                   ${l.dpi.map(d => `
                     <li class="text-xs bg-blue-50 border border-blue-200 text-blue-800
                                 px-2.5 py-1 rounded-full font-semibold">
                       ✅ ${d}
                     </li>
                   `).join('')}
                 </ul>`
            : '<p class="text-sm text-slate-400 italic">Nessun DPI registrato.</p>'
          }
          </div>

          <div>
            <div class="text-xs font-semibold text-slate-500 uppercase tracking-wide mb-2">
              Formazione
            </div>
            ${l.formazione?.length > 0
            ? `<ul class="space-y-1">
                   ${l.formazione.map(f => `
                     <li class="text-sm text-slate-700 flex items-start gap-2">
                       <span class="text-green-500 mt-0.5">✓</span>${f}
                     </li>
                   `).join('')}
                 </ul>`
            : '<p class="text-sm text-slate-400 italic">Nessuna formazione registrata.</p>'
          }
          </div>

          <div class="flex flex-wrap gap-3 pt-2">
            <button onclick="apriModalModificaLavoratore('${l.id}')"
                    class="text-xs bg-blue-600 text-white px-4 py-2 rounded-lg
                           hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-400 font-semibold"
                    aria-label="Modifica dati lavoratore">
              ✏️ Modifica
            </button>
            <button onclick="apriPannelloFormazione('${l.id}')"
                    class="text-xs bg-indigo-600 text-white px-4 py-2 rounded-lg
                           hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-400 font-semibold"
                    aria-label="Gestisci formazione lavoratore">
              📚 Formazione
            </button>
            <button onclick="apriSalvataggioScheda('${l.id}')"
                    class="text-xs bg-slate-700 text-white px-4 py-2 rounded-lg
                           hover:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-slate-400 font-semibold"
                    aria-label="Salva scheda lavoratore">
              💾 Salva
            </button>
            <button onclick="exportLavoratorePDF('${l.id}')"
                    class="text-xs bg-red-600 text-white px-4 py-2 rounded-lg
                           hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-400"
                    aria-label="PDF scheda lavoratore">
              🖨️ PDF
            </button>
          </div>

        </div>
      `;

        // Helper salvataggio scheda lavoratore — evita arrow in onclick HTML
        window.apriSalvataggioScheda = function (lavId) {
          if (typeof mostraPannelloSalvataggio === 'function') {
            mostraPannelloSalvataggio({
              titolo: 'Scheda Lavoratore',
              nascondJSON: true,
              onPDF: function () { if (typeof exportLavoratorePDF === 'function') exportLavoratorePDF(lavId); },
              onWord: function () { if (typeof exportLavoratoreWord === 'function') exportLavoratoreWord(lavId); }
            });
          } else if (typeof exportLavoratorePDF === 'function') {
            exportLavoratorePDF(lavId);
          }
        };

        // Carica documenti lavoratore
        await renderDocumentiLavoratore('documenti-lavoratore', currentLavoratoreId);

        // Collega documento
        document.getElementById('btn-collega-doc')?.addEventListener('click', () => {
          collegaDocumentoALavoratoreDaPopup(currentLavoratoreId);
        });

      } catch (err) {
        console.error('[SafeHub] Errore critico scheda lavoratore:', err);
        container.innerHTML = `
          <div class="bg-red-50 border border-red-200 p-6 rounded-xl text-center">
            <p class="text-red-700 font-bold mb-2">⚠️ Errore durante il caricamento della scheda</p>
            <p class="text-xs text-red-500 font-mono">${err.message || err}</p>
            <button onclick="window.location.reload()" class="mt-4 text-xs bg-red-600 text-white px-4 py-2 rounded-lg">Riprova</button>
          </div>
        `;
      }
    });
  </script>


  <!-- ═══════════ FOOTER ═══════════ -->
  <footer class="fixed bottom-0 left-0 right-0 z-40 pointer-events-none">
    <div class="flex items-end justify-between px-4 py-2 pointer-events-auto">

      <!-- Firma autore — sinistra -->
      <div class="text-[11px] text-slate-400 select-none">
        by <strong class="text-slate-500">Geom. Dogano Casella</strong> · ISP ANAS SpA
      </div>

      <!-- Pulsante installa PWA — destra -->
      <button id="btn-pwa-install" class="hidden items-center gap-2 bg-blue-600 text-white text-xs font-semibold
                     px-3 py-2 rounded-xl shadow-lg hover:bg-blue-700
                     focus:outline-none focus:ring-2 focus:ring-blue-400 transition"
        aria-label="Installa ANAS SafeHub come app">
        <span aria-hidden="true">📲</span> Installa App
      </button>

    </div>
  </footer>

  <!-- ═══════════ PWA + SW REGISTRATION ═══════════ -->
  <script>
    // Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('[PWA] SW registrato:', reg.scope))
          .catch(err => console.warn('[PWA] SW fallito:', err));
      });
    }

    // Install prompt
    let _deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      _deferredPrompt = e;
      const btn = document.getElementById('btn-pwa-install');
      if (btn) btn.classList.remove('hidden');
      if (btn) btn.classList.add('flex');
    });

    document.addEventListener('click', (e) => {
      if (e.target.closest('#btn-pwa-install') && _deferredPrompt) {
        _deferredPrompt.prompt();
        _deferredPrompt.userChoice.then(choice => {
          if (choice.outcome === 'accepted') {
            const btn = document.getElementById('btn-pwa-install');
            if (btn) btn.classList.add('hidden');
          }
          _deferredPrompt = null;
        });
      }
    });

    // Nasconde il pulsante se già installata
    window.addEventListener('appinstalled', () => {
      const btn = document.getElementById('btn-pwa-install');
      if (btn) btn.classList.add('hidden');
    });
  </script>

</body>

</html>
