<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dettaglio Verbale · ANAS SafeHub</title>

  <script>
    // Sopprimi l'avviso di Tailwind CDN in produzione per mantenere pulita la console
    (function() {
      var _tw = 'cdn.tailwindcss.com should not be used in production';
      ['warn','log'].forEach(function(m) {
        var orig = console[m];
        console[m] = function() {
          if (arguments[0] && typeof arguments[0] === 'string' && arguments[0].indexOf(_tw) !== -1) return;
          return orig.apply(console, arguments);
        };
      });
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: Inter, sans-serif;
    }

    input,
    textarea,
    select {
      font-size: max(16px, 0.875rem) !important;
    }

    button,
    [role="button"] {
      min-height: 44px;
    }
  </style>

  <!-- Script in ordine di dipendenza -->
  <script defer src="./db.js?v=2.2.4"></script>
  <script defer src="./storage.js?v=2.2.4"></script>
  <script defer src="./ui.js?v=2.2.4"></script>
  <script defer src="./navigation.js?v=2.2.4"></script>
  <script defer src="./firma.js?v=2.2.4"></script>
  <script defer src="./impostazioni.js?v=2.2.4"></script>
  <script defer src="./verbali-list.js?v=2.2.4"></script>
  <script defer src="./salvataggio.js?v=2.2.4"></script>
  <script defer src="./email.js?v=2.2.4"></script>
  <script defer src="./export.js?v=2.2.4"></script>
  <script defer src="./smart-memory.js?v=2.2.4"></script>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./animazioni.css" />
  <link rel="stylesheet" href="./mobile.css" />
</head>

<body class="bg-slate-50 text-slate-800 pb-16">

  <div class="max-w-4xl mx-auto px-4 py-5 space-y-5">

    <!-- HEADER con bottoni azione STATICI -->
    <header class="flex flex-wrap justify-between items-start gap-3" role="banner">

      <div>
        <div class="text-xs text-slate-400 font-mono mb-1" id="verbale-breadcrumb">–</div>
        <h1 class="text-xl font-bold text-slate-800">Verbale di Sopralluogo</h1>
        <p class="text-xs text-slate-500">Dettaglio e azioni</p>
      </div>

      <!-- BOTTONI AZIONE — statici, sempre visibili -->
      <div class="flex flex-wrap gap-2">

        <!-- ✉️ OUTLOOK — bottone principale -->
        <button id="btn-invia-email" class="flex items-center gap-2 bg-indigo-700 text-white text-sm px-4 py-2
                       rounded-lg font-semibold hover:bg-indigo-800
                       focus:outline-none focus:ring-2 focus:ring-indigo-400 transition"
          aria-label="Invia verbale via email Outlook">
          ✉️ Invia Email
        </button>

        <!-- 💾 SALVA / ESPORTA -->
        <button id="btn-salva-verbale" class="flex items-center gap-2 bg-blue-600 text-white text-sm px-4 py-2
                       rounded-lg font-semibold hover:bg-blue-700
                       focus:outline-none focus:ring-2 focus:ring-blue-400 transition"
          aria-label="Salva o esporta il verbale">
          💾 Salva / Esporta
        </button>

        <!-- 🖨️ PDF diretto -->
        <button id="btn-pdf-verbale" class="flex items-center gap-2 bg-red-600 text-white text-sm px-4 py-2
                       rounded-lg font-semibold hover:bg-red-700
                       focus:outline-none focus:ring-2 focus:ring-red-400 transition"
          aria-label="Stampa o salva PDF del verbale">
          🖨️ PDF
        </button>

        <!-- ← Dashboard -->
        <button onclick="window.location.href='dashboard-cantiere.html'" class="flex items-center gap-2 bg-slate-800 text-white text-sm px-4 py-2
                       rounded-lg font-semibold hover:bg-slate-700
                       focus:outline-none focus:ring-2 focus:ring-slate-400 transition"
          aria-label="Torna alla Dashboard Cantiere">
          ← Dashboard
        </button>

      </div>
    </header>

    <!-- CONTENUTO VERBALE (generato da JS) -->
    <section aria-label="Contenuto verbale">
      <div id="verbale-dettaglio-container" class="min-h-[200px]" aria-live="polite">
        <div class="bg-white rounded-xl border border-slate-200 p-6 text-slate-400 text-sm animate-pulse">
          Caricamento verbale…
        </div>
      </div>
    </section>

  </div>

  <!-- BOOTSTRAP + WIRE BOTTONI -->
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        await initDB();

        // Renderizza il contenuto del verbale
        if (typeof renderDettaglioVerbale === 'function') {
          await renderDettaglioVerbale('verbale-dettaglio-container');
        }

        // Legge l'ID del verbale corrente dal sessionStorage
        const verbaleId = sessionStorage.getItem('currentVerbaleId');

        // Aggiorna breadcrumb
        const projectId = sessionStorage.getItem('currentProjectId');
        const bc = document.getElementById('verbale-breadcrumb');
        if (bc && projectId) bc.textContent = `Cantiere ${projectId}`;

        // ── BOTTONE EMAIL ──────────────────────────────────────
        document.getElementById('btn-invia-email')?.addEventListener('click', async () => {
          if (!verbaleId) { showToast('Nessun verbale caricato.', 'error'); return; }
          if (typeof mostraPannelloEmail === 'function') {
            await mostraPannelloEmail({ tipo: 'verbale', id: verbaleId });
          } else {
            // Fallback diretto senza pannello
            if (typeof inviaVerbaleEmail === 'function') {
              await inviaVerbaleEmail(verbaleId);
            } else {
              showToast('Funzione email non disponibile.', 'error');
            }
          }
        });

        // ── BOTTONE SALVA / ESPORTA ────────────────────────────
        document.getElementById('btn-salva-verbale')?.addEventListener('click', async () => {
          if (!verbaleId) { showToast('Nessun verbale caricato.', 'error'); return; }

          // Recupera data verbale per il titolo
          let dataLabel = '–';
          try {
            const tutti = await getAll('verbali');
            const v = tutti.find(x => x.id === verbaleId);
            if (v && v.data) {
              dataLabel = new Date(v.data).toLocaleDateString('it-IT',
                { day: '2-digit', month: '2-digit', year: 'numeric' });
            }
          } catch (_) { }

          if (typeof mostraPannelloSalvataggio === 'function') {
            mostraPannelloSalvataggio({
              titolo: 'Verbale del ' + dataLabel,
              onPDF: function () {
                if (typeof exportVerbalePDF === 'function') exportVerbalePDF(verbaleId);
              },
              onWord: function () {
                if (typeof exportVerbaleWord === 'function') exportVerbaleWord(verbaleId);
              },
              onJSON: function () {
                if (typeof exportVerbaleJSON === 'function') exportVerbaleJSON(verbaleId);
              },
              onEmail: function () {
                if (typeof mostraPannelloEmail === 'function')
                  mostraPannelloEmail({ tipo: 'verbale', id: verbaleId });
              }
            });
          } else {
            // Fallback: PDF diretto
            if (typeof exportVerbalePDF === 'function') exportVerbalePDF(verbaleId);
          }
        });

        // ── BOTTONE PDF DIRETTO ────────────────────────────────
        document.getElementById('btn-pdf-verbale')?.addEventListener('click', async () => {
          if (!verbaleId) { showToast('Nessun verbale caricato.', 'error'); return; }
          if (typeof exportVerbalePDF === 'function') {
            await exportVerbalePDF(verbaleId);
          } else {
            window.print();
          }
        });

      } catch (err) {
        const c = document.getElementById('verbale-dettaglio-container');
        if (c) c.innerHTML =
          '<p class="text-red-600 font-semibold p-4">⚠️ Errore caricamento: ' + err + '</p>';
      }
    });
  </script>

  <!-- FOOTER -->
  <footer class="fixed bottom-0 left-0 right-0 z-40 pointer-events-none">
    <div class="flex items-end justify-between px-4 py-2 pointer-events-auto">
      <div class="text-[11px] text-slate-400 select-none">
        by <strong class="text-slate-500">Geom. Dogano Casella</strong> · ISP ANAS SpA
      </div>
      <button id="btn-pwa-install" class="hidden items-center gap-2 bg-blue-600 text-white text-xs font-semibold
                     px-3 py-2 rounded-xl shadow-lg hover:bg-blue-700
                     focus:outline-none focus:ring-2 focus:ring-blue-400 transition"
        aria-label="Installa ANAS SafeHub come app">
        📲 Installa App
      </button>
    </div>
  </footer>

  <!-- SW -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => { });
      });
    }
    let _dp = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault(); _dp = e;
      const b = document.getElementById('btn-pwa-install');
      if (b) { b.classList.remove('hidden'); b.classList.add('flex'); }
    });
    document.addEventListener('click', e => {
      if (e.target.closest('#btn-pwa-install') && _dp) {
        _dp.prompt();
        _dp.userChoice.then(() => {
          document.getElementById('btn-pwa-install')?.classList.add('hidden');
          _dp = null;
        });
      }
    });
  </script>

</body>

</html>
