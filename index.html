<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CSE SafeHub v3 · Hub Cantieri</title>
    <meta name="description" content="Suite professionale per Coordinatori della Sicurezza in Esecuzione">
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" href="icon-192.png" />
    <link rel="stylesheet" href="./tailwind.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />

    <style>
        body { font-family: 'Inter', sans-serif; }
        .page-hidden { display: none !important; }
        .card-hover:hover { transform: translateY(-4px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        /* Toast */
        #toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast { padding: 0.75rem 1.25rem; border-radius: 0.75rem; font-size: 0.75rem; font-weight: 700;
                 box-shadow: 0 4px 24px rgba(0,0,0,0.15); animation: slideIn 0.2s ease; }
        .toast-success { background: #166534; color: #dcfce7; }
        .toast-error   { background: #991b1b; color: #fee2e2; }
        .toast-info    { background: #1e3a5f; color: #dbeafe; }
        .toast-warning { background: #854d0e; color: #fef9c3; }
        @keyframes slideIn { from { opacity:0; transform:translateX(2rem); } to { opacity:1; transform:translateX(0); } }
        /* Sidebar active */
        .nav-active { background: #1e293b !important; color: #fff !important; }
    </style>

    <!-- Core DB + App -->
    <script defer src="./db.js"></script>
    <script defer src="./impostazioni.js"></script>
    <script defer src="./app.js"></script>

    <!-- Moduli Anagrafiche v3 (FASE 4) -->
    <script defer src="./catalogo-tipologie-mezzi.js"></script>
    <script defer src="./imprese.js"></script>
    <script defer src="./persone-anas.js"></script>
    <script defer src="./persone-terzi.js"></script>
    <script defer src="./lavoratori.js"></script>
    <script defer src="./mezzi.js"></script>

    <!-- Moduli Verbali & Docx (FASE 5) -->
    <script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.6/dist/pizzip.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.50.0/build/docxtemplater.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater-image-module-free@1.1.1/build/index.js"></script>
    <!-- FASE 5.2: JSZip (allegati foto ZIP) + docx-preview (anteprima in-browser) -->
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docx-preview@0.3.6/dist/docx-preview.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/docx-preview@0.3.6/dist/docx-preview.min.js"></script>
    <script defer src="./signature-canvas.js"></script>
    <script defer src="./docx-generator.js"></script>
    <script defer src="./verbali-sopralluogo.js"></script>
    <script defer src="./verbali-riunione.js"></script>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <!-- TOPBAR -->
    <header id="main-topbar" class="bg-slate-900 text-white p-4 flex justify-between items-center shrink-0 shadow-xl z-[1000]">
        <div class="flex items-center gap-4">
            <div id="btn-back-home" class="page-hidden">
                <button onclick="Router.nav('HOME')" class="bg-slate-800 hover:bg-slate-700 p-2 rounded-lg transition-all">
                    <span>← Home</span>
                </button>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-2xl">🚧</span>
                <h1 id="app-title" class="text-xl font-bold tracking-tight"><span class="text-yellow-400">CSE</span> SafeHub</h1>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <span class="bg-indigo-600 text-white text-[9px] font-black px-2 py-0.5 rounded-full uppercase tracking-widest">AI</span>
            <button onclick="Router.navSubView('IMPOSTAZIONI')" class="bg-slate-800 hover:bg-slate-700 p-2 rounded-lg transition" title="Impostazioni">⚙️</button>
        </div>
    </header>

    <!-- LIVELLO 1: I MIEI CANTIERI -->
    <main id="view-home" class="flex-1 p-6 max-w-7xl mx-auto w-full space-y-10">
        <section>
            <div class="flex justify-between items-end mb-8 border-b border-slate-200 pb-4">
                <div>
                    <h2 class="text-3xl font-extrabold text-slate-900">I Miei Cantieri</h2>
                    <p class="text-slate-500 text-sm mt-1">Seleziona un progetto per entrare nel contesto operativo.</p>
                </div>
                <button onclick="UI.apriModalCantiere()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-3 rounded-2xl shadow-lg transition-all flex items-center gap-2">
                    <span>+</span> Nuovo Progetto
                </button>
            </div>
            <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Card renderizzate da app.js -->
            </div>
        </section>

        <!-- STRUMENTI GLOBALI -->
        <section class="bg-white rounded-[2.5rem] p-10 border border-slate-200 shadow-sm">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-6">Strumenti Globali</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <button onclick="Router.navSubView('IMPOSTAZIONI')" class="flex flex-col items-center gap-3 p-6 rounded-3xl hover:bg-slate-50 transition-all border border-transparent hover:border-slate-100">
                    <span class="text-3xl">⚙️</span>
                    <span class="font-bold text-sm">Impostazioni</span>
                </button>
                <button class="flex flex-col items-center gap-3 p-6 rounded-3xl hover:bg-red-50 transition-all border border-transparent hover:border-red-100 text-red-700">
                    <span class="text-3xl">☎️</span>
                    <span class="font-bold text-sm">Emergenze</span>
                </button>
                <button class="flex flex-col items-center gap-3 p-6 rounded-3xl hover:bg-indigo-50 transition-all border border-transparent hover:border-indigo-100 text-indigo-700">
                    <span class="text-3xl">🤖</span>
                    <span class="font-bold text-sm">Normativa AI</span>
                </button>
                <button class="flex flex-col items-center gap-3 p-6 rounded-3xl hover:bg-green-50 transition-all border border-transparent hover:border-green-100 text-green-700">
                    <span class="text-3xl">💾</span>
                    <span class="font-bold text-sm">Backup</span>
                </button>
            </div>
        </section>
    </main>

    <!-- LIVELLO 2: CONTESTO CANTIERE -->
    <main id="view-cantiere" class="page-hidden flex-1 flex flex-col md:flex-row overflow-hidden">

        <!-- SIDEBAR CANTIERE -->
        <aside class="w-72 bg-slate-900 text-slate-400 flex flex-col border-r border-slate-800 shrink-0">
            <nav class="flex-1 p-4 space-y-6 overflow-y-auto">

                <!-- Operatività -->
                <div>
                    <h4 class="text-[10px] font-bold text-slate-600 uppercase tracking-widest mb-3 px-3">Operatività</h4>
                    <div class="space-y-1">
                        <button onclick="Router.navSubView('DASHBOARD')" id="nav-DASHBOARD"
                                class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white transition-all flex items-center gap-3 text-sm">
                            <span>📊</span> Dashboard
                        </button>
                        <button onclick="Router.navSubView('VERBALI')" id="nav-VERBALI"
                                class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white transition-all flex items-center gap-3 text-sm">
                            <span>📝</span> Verbali Sopralluogo
                        </button>
                        <button onclick="Router.navSubView('VERBALI_RIUNIONE')" id="nav-VERBALI_RIUNIONE"
                                class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white transition-all flex items-center gap-3 text-sm">
                            <span>🤝</span> Verbali Riunione
                        </button>
                        <button onclick="Router.navSubView('NC')" id="nav-NC"
                                class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white transition-all flex items-center gap-3 text-sm">
                            <span>⚠️</span> Non Conformità
                        </button>
                    </div>
                </div>

                <!-- Anagrafiche -->
                <div>
                    <h4 class="text-[10px] font-bold text-slate-600 uppercase tracking-widest mb-3 px-3">Anagrafiche</h4>
                    <div class="space-y-1">
                        <button onclick="Router.navSubView('IMPRESE')" id="nav-IMPRESE"
                                class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white transition-all flex items-center gap-3 text-sm">
                            <span>🏗️</span> Imprese
                        </button>
                        <button onclick="Router.navSubView('ANAS')" id="nav-ANAS"
                                class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white transition-all flex items-center gap-3 text-sm">
                            <span>👷</span> Sicurezza & Personale
                        </button>
                        <button onclick="Router.navSubView('TERZI')" id="nav-TERZI"
                                class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white transition-all flex items-center gap-3 text-sm">
                            <span>🏛️</span> Enti Terzi
                        </button>
                        <button onclick="Router.navSubView('LAVORATORI')" id="nav-LAVORATORI"
                                class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white transition-all flex items-center gap-3 text-sm">
                            <span>👤</span> Lavoratori
                        </button>
                        <button onclick="Router.navSubView('MEZZI')" id="nav-MEZZI"
                                class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white transition-all flex items-center gap-3 text-sm">
                            <span>🚜</span> Mezzi & Attrezzature
                        </button>
                    </div>
                </div>

                <!-- Documentazione -->
                <div>
                    <h4 class="text-[10px] font-bold text-slate-600 uppercase tracking-widest mb-3 px-3">Documentazione</h4>
                    <div class="space-y-1">
                        <button onclick="Router.navSubView('VERIFICHE_POS')" id="nav-VERIFICHE_POS"
                                class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white transition-all flex items-center gap-3 text-sm">
                            <span>📋</span> Verifica POS
                        </button>
                        <button onclick="Router.navSubView('ODS')" id="nav-ODS"
                                class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white transition-all flex items-center gap-3 text-sm">
                            <span>📨</span> ODS
                        </button>
                        <button onclick="Router.navSubView('SOSPENSIONI')" id="nav-SOSPENSIONI"
                                class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white transition-all flex items-center gap-3 text-sm">
                            <span>🛑</span> Sospensioni
                        </button>
                    </div>
                </div>

                <!-- Gestione -->
                <div>
                    <h4 class="text-[10px] font-bold text-slate-600 uppercase tracking-widest mb-3 px-3">Gestione</h4>
                    <div class="space-y-1">
                        <button onclick="Router.navSubView('DIARIO')" id="nav-DIARIO"
                                class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white transition-all flex items-center gap-3 text-sm">
                            <span>📖</span> Diario CSE
                        </button>
                        <button onclick="Router.navSubView('EVENTI')" id="nav-EVENTI"
                                class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white transition-all flex items-center gap-3 text-sm">
                            <span>🚨</span> Eventi Incidentali
                        </button>
                        <button onclick="Router.navSubView('DOCUMENTI')" id="nav-DOCUMENTI"
                                class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white transition-all flex items-center gap-3 text-sm">
                            <span>📁</span> Archivio Documenti
                        </button>
                        <button onclick="Router.navSubView('IMPOSTAZIONI')" id="nav-IMPOSTAZIONI"
                                class="w-full text-left px-3 py-2.5 rounded-xl hover:bg-slate-800 hover:text-white transition-all flex items-center gap-3 text-sm">
                            <span>⚙️</span> Impostazioni
                        </button>
                    </div>
                </div>

            </nav>

            <!-- Info cantiere corrente -->
            <div id="sidebar-cantiere-info" class="p-4 border-t border-slate-800 text-[10px] text-slate-500"></div>
        </aside>

        <!-- AREA CONTENUTO CANTIERE -->
        <div id="cantiere-content" class="flex-1 p-8 overflow-y-auto bg-slate-50">
            <!-- View dinamiche cantiere renderizzate da app.js -->
        </div>
    </main>

    <!-- MODAL NUOVO CANTIERE -->
    <div id="modal-new-project" class="page-hidden fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[2000] flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] w-full max-w-md shadow-2xl overflow-hidden animate-in zoom-in-95">
            <div class="p-8 space-y-6">
                <h3 class="text-2xl font-bold">Crea Nuovo Cantiere</h3>
                <div class="space-y-4">
                    <input type="text" id="new-p-id" placeholder="Codice (es. CZ399)" class="w-full p-4 rounded-2xl border bg-slate-50 uppercase font-mono text-sm">
                    <input type="text" id="new-p-name" placeholder="Nome Intervento / Lotto" class="w-full p-4 rounded-2xl border bg-slate-50">
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="UI.chiudiModalCantiere()" class="flex-1 p-4 text-slate-400 font-bold">Annulla</button>
                    <button onclick="CantiereController.crea()" class="flex-1 p-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg">Crea Progetto</button>
                </div>
            </div>
        </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div id="toast-container"></div>

    <!-- FOOTER -->
    <footer class="bg-slate-900 text-slate-500 text-center text-xs py-3 shrink-0 border-t border-slate-800">
      CSE SafeHub &middot; by <strong class="text-slate-300">Geom. Dogano Casella</strong>
    </footer>

</body>
</html>
