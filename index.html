<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ANAS SafeHub · Hub Cantieri CSE</title>
  <link rel="icon" type="image/png" href="icon-192.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    .page-hidden { display: none !important; }
  </style>

  <!-- Script Architettura v3 -->
  <script defer src="./db.js"></script>
  <script defer src="./app.js"></script>
  
  <!-- File legacy lasciati temporaneamente per non rimuoverli brutalmente (gestiti in fasi future) -->
  <script defer src="./ui.js"></script>
</head>

<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

  <!-- TOPBAR -->
  <header class="bg-slate-900 text-white p-4 flex justify-between items-center shrink-0 shadow-md z-10">
    <div class="flex items-center gap-3">
      <span class="text-2xl" aria-hidden="true">🚧</span>
      <h1 class="text-xl font-bold tracking-tight">ANAS SafeHub</h1>
    </div>
    <div class="flex items-center gap-3">
      <button id="btn-onedrive" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-sm font-semibold px-3 py-1.5 rounded border border-slate-700 transition">
        <span>☁️</span> <span class="hidden sm:inline">OneDrive</span>
      </button>
      <button id="btn-settings" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 text-sm font-semibold px-3 py-1.5 rounded border border-slate-700 transition" aria-label="Impostazioni">
        <span>⚙️</span>
      </button>
    </div>
  </header>

  <!-- VISTA HOME: I MIEI CANTIERI -->
  <main id="home-view" class="flex-1 p-6 max-w-6xl mx-auto w-full space-y-10">
    
    <!-- Sezione Cantieri -->
    <section>
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-6 border-b border-slate-200 pb-3 gap-4">
        <h2 class="text-2xl font-extrabold text-slate-800 flex items-center gap-2">
          <span>📂</span> I MIEI CANTIERI
        </h2>
        <button onclick="apriModalNuovoCantiere()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold px-4 py-2 rounded-lg shadow-sm transition flex items-center gap-2 shrink-0">
          <span>+</span> Nuovo Cantiere
        </button>
      </div>
      
      <!-- Grid dei cantieri -->
      <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Renderizzato da app.js -->
      </div>
    </section>

    <hr class="border-slate-300" />

    <!-- Sezione Strumenti Globali -->
    <section>
      <h2 class="text-lg font-bold text-slate-500 mb-4 uppercase tracking-wider flex items-center gap-2">
        <span>🛠️</span> STRUMENTI GLOBALI
      </h2>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <button class="bg-white border border-slate-200 p-4 rounded-xl shadow-sm hover:shadow-md hover:bg-slate-50 transition flex flex-col items-center gap-2 text-slate-700 font-semibold" onclick="typeof mostraManualeUso === 'function' ? mostraManualeUso() : alert('Manuale non caricato')">
          <span class="text-2xl">📖</span> Manuale
        </button>
        <button class="bg-red-50 border border-red-200 p-4 rounded-xl shadow-sm hover:shadow-md hover:bg-red-100 transition flex flex-col items-center gap-2 text-red-700 font-semibold" onclick="typeof apriNumeriEmergenza === 'function' ? apriNumeriEmergenza() : alert('Emergenze non caricate')">
          <span class="text-2xl">☎️</span> Emergenze
        </button>
        <button class="bg-indigo-50 border border-indigo-200 p-4 rounded-xl shadow-sm hover:shadow-md hover:bg-indigo-100 transition flex flex-col items-center gap-2 text-indigo-700 font-semibold" onclick="typeof apriPannelloRicerca === 'function' ? apriPannelloRicerca() : alert('Normativa AI non caricata')">
          <span class="text-2xl">🤖</span> Normativa AI
        </button>
        <button class="bg-green-50 border border-green-200 p-4 rounded-xl shadow-sm hover:shadow-md hover:bg-green-100 transition flex flex-col items-center gap-2 text-green-700 font-semibold" onclick="typeof mostraPannelloSalvataggio === 'function' ? mostraPannelloSalvataggio({titolo: 'Backup Dati', nascondWord: true}) : alert('Pannello backup non trovato')">
          <span class="text-2xl">💾</span> Backup
        </button>
      </div>
    </section>

  </main>

  <!-- VISTA CANTIERE (Placeholder per FASE 3) -->
  <main id="cantiere-view" class="page-hidden flex-1 p-6 max-w-6xl mx-auto w-full">
    <button onclick="tornaHome()" class="text-blue-600 hover:text-blue-800 font-bold mb-6 flex items-center gap-1 transition">
      ← Torna a I Miei Cantieri
    </button>
    <div class="bg-white rounded-xl shadow-sm p-8 text-center border border-slate-200">
      <h2 id="cantiere-title" class="text-2xl font-bold text-slate-800 mb-2">Contesto Cantiere SPA</h2>
      <p class="text-slate-500">La navigazione e i moduli cantiere saranno implementati nella FASE 3.</p>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-slate-900 border-t border-slate-800 p-4 text-center shrink-0 mt-auto">
    <div class="text-[11px] text-slate-400 font-semibold uppercase tracking-widest">
      by Geom. Dogano Casella · ANAS S.p.A.
    </div>
  </footer>

  <!-- MODAL NUOVO CANTIERE -->
  <div id="modal-new-project" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
      <div class="bg-blue-600 p-4 text-white">
        <h3 class="font-bold text-lg">Crea Nuovo Cantiere</h3>
      </div>
      <div class="p-6 space-y-4">
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Codice Cantiere (Univoco)</label>
          <input type="text" id="new-project-id" placeholder="Es. CZ399" class="w-full border border-slate-300 rounded-lg p-2.5 font-mono uppercase focus:ring-2 focus:ring-blue-500 focus:outline-none" />
          <p class="text-[10px] text-slate-400 mt-1">Ammessi solo A-Z, 0-9, trattino, underscore.</p>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-wide mb-1">Nome Cantiere / Intervento</label>
          <input type="text" id="new-project-name" placeholder="Es. Viadotto S. Giorgio - S.S. 106" class="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 focus:outline-none" />
        </div>
      </div>
      <div class="bg-slate-50 p-4 border-t border-slate-100 flex justify-end gap-3">
        <button onclick="chiudiModalNuovoCantiere()" class="px-4 py-2 text-sm font-semibold text-slate-600 hover:bg-slate-200 rounded-lg transition">Annulla</button>
        <button onclick="salvaNuovoCantiere()" class="px-5 py-2 text-sm font-bold bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow transition">Crea Cantiere</button>
      </div>
    </div>
  </div>

</body>
</html>
